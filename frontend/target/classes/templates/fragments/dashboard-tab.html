<div th:fragment="dashboard" xmlns:th="http://www.thymeleaf.org" id="tab-dashboard" class="tab-content active">
    <!-- Widgets Summary -->
    <div class="pos-layout" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); height: auto; margin-bottom: 35px; gap: 20px;">
        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 36px;">💰</span>
            <div>
                <h3 style="color: var(--text-secondary); font-size: 12px; text-transform: uppercase;">Ventas del Día</h3>
                <div id="admin-revenues" style="font-size: 24px; font-weight: 800; color: #10b981; margin-top: 3px;">S/. 0.00</div>
            </div>
        </div>

        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 36px;">🍗</span>
            <div>
                <h3 style="color: var(--text-secondary); font-size: 12px; text-transform: uppercase;">Ordenes Cobradas</h3>
                <div id="admin-orders-count" style="font-size: 24px; font-weight: 800; color: #3b82f6; margin-top: 3px;">0 Pedidos</div>
            </div>
        </div>

        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 36px;">⚠️</span>
            <div>
                <h3 style="color: var(--text-secondary); font-size: 12px; text-transform: uppercase;">Alertas de Stock</h3>
                <div id="admin-stock-alerts" style="font-size: 24px; font-weight: 800; color: #ef4444; margin-top: 3px;">0 Insumos</div>
            </div>
        </div>

        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 36px;">🍽️</span>
            <div>
                <h3 style="color: var(--text-secondary); font-size: 12px; text-transform: uppercase;">Mesas Ocupadas</h3>
                <div id="admin-tables-busy" style="font-size: 24px; font-weight: 800; color: #f59e0b; margin-top: 3px;">0 / 10</div>
            </div>
        </div>
    </div>

    <!-- Dashboard Charts -->
    <div class="charts-grid">
        <div class="glass-panel chart-card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">📈 Tendencia de Ventas (Últimos 7 Días)</h3>
            <canvas id="chart-sales-date"></canvas>
        </div>
        <div class="glass-panel chart-card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">📁 Ventas por Categoría</h3>
            <canvas id="chart-sales-category"></canvas>
        </div>
        <div class="glass-panel chart-card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">💳 Canales de Pago Preferidos</h3>
            <canvas id="chart-payments"></canvas>
        </div>
        <div class="glass-panel chart-card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">🏆 Top 5 Productos Más Vendidos</h3>
            <canvas id="chart-top-products"></canvas>
        </div>
    </div>
</div>
