version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pollo-db
    restart: always
    environment:
      MYSQL_DATABASE: pollo_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pollo-backend
    restart: always
    depends_on:
      - mysql
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/pollo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USER=root
      - DB_PASSWORD=root
      - BACKEND_PORT=8080
      - FRONTEND_URL=http://localhost:8081
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250655368566D5970
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pollo-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - FRONTEND_PORT=8081
      - BACKEND_URL=http://backend:8080/api
    ports:
      - "8081:8081"

volumes:
  mysql_data:
